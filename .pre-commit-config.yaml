exclude: |
  (?x)^(
      .*\{\{.*\}\}.*|     # Exclude any files with cookiecutter variables
      docs/site/.*|       # Exclude mkdocs compiled files
      \.history/.*|       # Exclude history files
      .*cache.*/.*|       # Exclude cache directories
      .*venv.*/.*|        # Exclude virtual environment directories
  )$
fail_fast: false
default_language_version:
  python: python3.12
default_install_hook_types:
  - pre-commit
  - commit-msg
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: 2ca41cc1372d1e939a6a879f18cdc19fc1cac1ce # frozen: v8.30.0
    hooks:
      - id: gitleaks
        name: "🔒 Security · GitLeaks · Detect hardcoded secrets"

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: b969e2851312ca2b24bbec879ba4954341d1bd12 # frozen: v0.15.5
    hooks:
      - id: ruff-format
        name: "🐍 Python · Ruff · Code formatting"
      - id: ruff-check
        name: "🐍 Python · Ruff · Linting"

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: 4b2e70d08cb2ccd26d1fba73588de41c7a5d50b7 # frozen: v0.25
    hooks:
      - id: validate-pyproject
        name: "🐍 Python · Validate pyproject.toml"
        additional_dependencies: ["validate-pyproject-schema-store[all]"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: a66e98df7b4aeeb3724184b332785976d062b92e # frozen: v1.19.1
    hooks:
      - id: mypy
        name: "🐍 Python · mypy · Check static types"
        args:
          - --strict
          - --show-error-codes
          - --show-error-context
          - --show-column-numbers
        additional_dependencies:
          - attrs
          - flask
          - jwskate
          - pytest_examples
          - pytest-freezer
          - pytest-mock
          - pytest-mypy
          - requests_mock
          - types-requests
          - yarl

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 8db279a37c552206d2df62269ff6f9d31125815a # frozen: 0.37.0
    hooks:
      - id: check-github-workflows
        name: "🐙 Github-Actions · Validate gh workflow files"
        args: ["--verbose"]

  - repo: https://github.com/hukkin/mdformat
    rev: 2d496dbc18e31b83a1596685347ffe0b6041daf0 # frozen: 1.0.0
    hooks:
      - id: mdformat
        name: "📝 Markdown · Format markdown"
        args:
          - --wrap=120
        additional_dependencies:
          - mdformat-gfm
          - mdformat-ruff
          - ruff

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: 745eface02aef23e168a8afb6b5737818efbea95 # frozen: v0.11.0.1
    hooks:
      - id: shellcheck
        name: "🐚 Shell · shellcheck · Lint shell scripts"

  - repo: https://github.com/openstack/bashate
    rev: 5798d24d571676fc407e81df574c1ef57b520f23 # frozen: 2.1.1
    hooks:
      - id: bashate
        name: "🐚 Shell · bashate · Check shell script code style"
        args: [--max-line-length, "120"]

  - repo: https://github.com/jvllmr/pre-commit-prettier
    rev: c6c4f2c09b36f023c17d43bce4d86b8aa3b09493 # frozen: v3.8.1
    hooks:
      - id: prettier
        name: "✨ Misc · prettier · Format misc web files"
        types_or: [yaml, html, scss]
        additional_dependencies:
          - prettier@3.7.4

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # frozen: v6.0.0
    hooks:
      - id: check-executables-have-shebangs
        name: "📁 filesystem/⚙️ exec · Verify shebang presence"
      - id: check-shebang-scripts-are-executable
        name: "📁 filesystem/⚙️ exec · Verify script permissions"
      - id: check-case-conflict
        name: "📁 filesystem/📝 names · Check case sensitivity"
      - id: check-illegal-windows-names
        name: "📁 filesystem/📝 names · Validate Windows filenames"
      - id: check-symlinks
        name: "📁 filesystem/🔗 symlink · Check symlink validity"
      - id: destroyed-symlinks
        name: "📁 filesystem/🔗 symlink · Detect broken symlinks"
      - id: check-merge-conflict
        name: "🌳 git · Detect conflict markers"
      - id: forbid-new-submodules
        name: "🌳 git · Prevent submodule creation"
      - id: no-commit-to-branch
        name: "🌳 git · Protect main branches"
        args: ["--branch", "main", "--branch", "master"]
      - id: check-added-large-files
        name: "🌳 git · Block large file commits"
        args: ["--maxkb=5000"]

  - repo: https://github.com/commitizen-tools/commitizen
    rev: 4fbeae7861663ecf4b4989211eba41c1a3fb1227 # frozen: v4.13.9
    hooks:
      - id: commitizen
        name: "🌳 git · Validate commit message"
        stages: [commit-msg]
        additional_dependencies: [cz-conventional-gitmoji]

  - repo: https://github.com/codespell-project/codespell
    rev: 2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a # frozen: v2.4.2
    hooks:
      - id: codespell
        name: "💎 QA · codespell · Check for common typos"
        additional_dependencies:
          - tomli
